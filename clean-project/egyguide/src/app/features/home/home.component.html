<div class="home-container">
  <div class="overlay"></div>
  <div class="sparkles">
    <div class="sparkle" style="top: 20%; left: 15%; animation-delay: 0s;"></div>
    <div class="sparkle" style="top: 40%; left: 80%; animation-delay: 0.5s;"></div>
    <div class="sparkle" style="top: 60%; left: 25%; animation-delay: 1s;"></div>
    <div class="sparkle" style="top: 75%; left: 70%; animation-delay: 1.5s;"></div>
    <div class="sparkle" style="top: 30%; left: 50%; animation-delay: 2s;"></div>
    <div class="sparkle" style="top: 85%; left: 40%; animation-delay: 0.3s;"></div>
  </div>

  <div class="hero-content">
    <h1 class="hero-title">
      <span class="line1">{{ 'home.line1' | translate }}</span>
      <span class="line2">{{ 'home.line2' | translate }}</span>
    </h1>
    <p class="hero-subtitle">
      {{ 'home.subtitle' | translate }}
    </p>
    <button class="cta-button" (click)="startExploring()">
      <span class="button-text">{{ 'home.cta' | translate }}</span>
      <span class="button-glow"></span>
    </button>
  </div>
</div>
